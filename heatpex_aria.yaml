# heatpex_aria.yaml
uart:
  - id: heatpex_uart
    rx_pin: GPIO14
    tx_pin: GPIO15
    baud_rate: 9600
    stop_bits: 1

modbus:
  - id: heatpex_modbus
    uart_id: heatpex_uart
    send_wait_time: 200ms

modbus_controller:
  - id: heatpex_aria
    address: 1
    modbus_id: heatpex_modbus
    command_throttle: 250ms
    update_interval: 10s

sensor:
  - platform: modbus_controller
    modbus_controller_id: heatpex_aria
    name: "${device_name} T1 Nawiew"
    address: 6
    register_type: holding
    value_type: INT16
    filters: [multiply: 0.1]
    unit_of_measurement: "°C"

  - platform: modbus_controller
    modbus_controller_id: heatpex_aria
    name: "${device_name} T2 Wyciąg"
    address: 7
    register_type: holding
    value_type: INT16
    filters: [multiply: 0.1]
    unit_of_measurement: "°C"

  - platform: modbus_controller
    modbus_controller_id: heatpex_aria
    name: "${device_name} Nawiew %"
    address: 43
    register_type: holding
    value_type: UINT16
    unit_of_measurement: "%"

  - platform: modbus_controller
    modbus_controller_id: heatpex_aria
    name: "${device_name} Wyciąg %"
    address: 44
    register_type: holding
    value_type: UINT16
    unit_of_measurement: "%"

switch:
  - platform: modbus_controller
    modbus_controller_id: heatpex_aria
    name: "${device_name} Bypass"
    address: 17
    register_type: holding
    value_type: UINT16
    write_lambda: |-
      if (x) {
        id(heatpex_aria).write_single_register(17, 1);
        return true;
      } else {
        id(heatpex_aria).write_single_register(17, 0);
        return true;
      }
